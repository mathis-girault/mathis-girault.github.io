<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Les BDE dans le monde</title>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />

    <!-- Leaflet related -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <!-- Import de la base de donnée -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <!-- My page -->
    <script type="module" src="index.js"></script>
    <link rel="styleSheet" type="text/css" href="index.css" />
    <link rel="icon" href="images/earth.png" type="image/x-icon" />
  </head>

  <body class="no-margin">
    <!-- Gestion du menu -->
    <nav id="navigation">
      <div id="menu-container">
        <div id="menu">
          <h3>Marqueurs visibles :</h3>
          <div class="menu-item-container">
            <input type="radio" name="mode" id="stage" value="stage" checked />
            <label for="stage">Stage</label>
          </div>

          <div class="menu-item-container">
            <input type="radio" name="mode" id="semester1" value="semester1" />
            <label for="semester1">Semestre 1 3A</label>
          </div>
        </div>

        <div id="mobile-menu">
          <input
            type="button"
            class="mobile-menu-button"
            id="mobile-stage"
            value="Stage"
          />
          <input
            type="button"
            class="mobile-menu-button"
            id="mobile-semester1"
            value="Semestre 1 3A"
          />
          <div class="selected-marker"></div>
        </div>

        <div id="menu-helper">
          <p id="menu-helper-text">
            Cliquez sur un marqueur pour voir la liste des noms !
          </p>
        </div>
      </div>

      <input
        type="button"
        id="add-user"
        class="menu-button"
        title="Ajoutez votre marqueur"
      />
    </nav>

    <!-- Gestion de la carte -->
    <div id="map-container">
      <div id="map"></div>
    </div>

    <!-- Formulaire ajout nouvel utilisateur -->
    <div id="form-container">
      <form id="add-user-form">
        <h3 id="form-title">Ajoutez votre marqueur</h3>

        <div class="form-group">
          <label for="name">Ton blaze :</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="John Doe"
            required
          />
        </div>

        <div class="form-group">
          <label for="city">La ville :</label>
          <input
            type="text"
            id="city"
            name="city"
            placeholder="Ville, Pays"
            required
          />
        </div>

        <div class="form-group">
          <label for="is-stage">Pour quelle période :</label>
          <div id="is-stage">
            <div class="form-radio-stage">
              <input
                type="radio"
                id="stage-choice"
                name="isStage"
                value="stage"
                required
              />
              <label for="stage-choice">Stage</label>
            </div>
            <div class="form-radio-stage">
              <input
                type="radio"
                id="semester1-choice"
                name="isStage"
                value="semester1"
                required
              />
              <label for="semester1-choice">Semestre 1 3A</label>
            </div>
          </div>
        </div>

        <div id="form-submit">
          <input
            type="button"
            id="annuler"
            class="form-button"
            value="Annuler"
          />
          <button type="submit" class="form-button" id="add-user-submit">
            Ajouter
          </button>
        </div>
      </form>
    </div>

    <!-- Espace de discussion -->
    <div id="discussion-background">
      <div id="discussion-container">
        <h1 id="discussion-title"></h1>
        <p id="discussion-description">
          <i>Petite zone de texte où vous pouvez écrire à votre guise !</i>
        </p>
        <textarea name="textarea" id="discussion"></textarea>
        <input type="button" id="discussion-close" value="Fermer" />
      </div>
    </div>
  </body>
</html>
