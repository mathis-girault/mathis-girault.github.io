<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Les BDE dans le monde</title>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Leaflet related -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <!-- My page -->
    <script type="module" src="index.js"></script>
    <link rel="styleSheet" type="text/css" href="index.css" />
    <link rel="icon" href="images/earth.png" type="image/x-icon" />
  </head>

  <body class="no-margin">
    <!-- Gestion du menu -->
    <nav id="menu-container">
      <div id="menu">
        <h3>Marqueurs visibles :</h3>
        <div class="menu-item-container">
          <input type="radio" name="mode" id="stage" value="stage" checked />
          <label for="stage">Stage</label>
        </div>

        <div class="menu-item-container">
          <input type="radio" name="mode" id="cesure" value="cesure" />
          <label for="cesure">Cesure</label>
        </div>
      </div>
      <div id="menu-helper">
        <p id="menu-helper-text">
          Cliquez sur un marqueur pour voir la liste des noms !
        </p>
      </div>
    </nav>

    <!-- Gestion de la carte -->
    <div id="map-container" class="selected">
      <div id="map"></div>
    </div>
  </body>
</html>
